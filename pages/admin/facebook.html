<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Facebook - OmniChat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { color: #1a1a2e; }
    .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h2 { margin-bottom: 20px; color: #333; }
    .workspace-selector { margin-bottom: 24px; }
    .workspace-selector label { margin-bottom: 8px; }
    .workspace-selector select { width: 100%; max-width: 400px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    button { background: #4f46e5; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #4338ca; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #6b7280; }
    .btn-secondary:hover { background: #4b5563; }
    .btn-danger { background: #ef4444; }
    .btn-danger:hover { background: #dc2626; }
    .btn-facebook { background: #1877f2; }
    .btn-facebook:hover { background: #166fe5; }
    .page-list { list-style: none; }
    .page-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 12px; }
    .page-info { display: flex; align-items: center; gap: 12px; }
    .page-icon { width: 40px; height: 40px; background: #e4e6eb; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .page-name { font-weight: 500; }
    .page-id { font-size: 12px; color: #666; }
    .empty { text-align: center; color: #999; padding: 40px; }
    .error { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .success { background: #d1fae5; color: #065f46; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .connect-box { text-align: center; padding: 40px; border: 2px dashed #ddd; border-radius: 12px; }
    .connect-box p { margin-bottom: 16px; color: #666; }
    .note { font-size: 13px; color: #888; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📘 Facebook Pages</h1>
      <button class="btn-secondary" onclick="logout()">Logout</button>
    </div>
    
    <div class="workspace-selector">
      <label><strong>Workspace:</strong></label>
      <select id="workspace" onchange="loadPages()">
        <option value="">Select workspace...</option>
      </select>
    </div>
    
    <div id="error"></div>
    <div id="success"></div>
    
    <div class="card">
      <h2>Connected Pages</h2>
      <div id="pagesList">
        <div class="empty">Select a workspace to view connected pages</div>
      </div>
    </div>
    
    <div class="card">
      <h2>Connect New Page</h2>
      <div class="connect-box">
        <p>Connect your Facebook Page to start receiving and responding to messages.</p>
        <button class="btn-facebook" onclick="connectFacebook()" id="connectBtn">
          Connect Facebook Page
        </button>
        <p class="note">You'll be redirected to Facebook to authorize access to your pages.</p>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    let token = localStorage.getItem('token');
    let currentWorkspace = '';
    
    if (!token) {
      window.location.href = '/login';
    }
    
    async function loadWorkspaces() {
      const res = await fetch(`${API}/api/workspaces`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      const select = document.getElementById('workspace');
      data.forEach(ws => {
        const opt = document.createElement('option');
        opt.value = ws.id;
        opt.textContent = ws.name;
        select.appendChild(opt);
      });
    }
    
    async function loadPages() {
      currentWorkspace = document.getElementById('workspace').value;
      const container = document.getElementById('pagesList');
      
      if (!currentWorkspace) {
        container.innerHTML = '<div class="empty">Select a workspace to view connected pages</div>';
        return;
      }
      
      container.innerHTML = '<div class="empty">Loading...</div>';
      
      const res = await fetch(`${API}/api/facebook/pages?workspace_id=${currentWorkspace}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (res.status === 403) {
        container.innerHTML = '<div class="empty">Only admins can manage Facebook pages</div>';
        return;
      }
      
      const { pages } = await res.json();
      
      if (!pages?.length) {
        container.innerHTML = '<div class="empty">No Facebook pages connected yet</div>';
        return;
      }
      
      container.innerHTML = `
        <ul class="page-list">
          ${pages.map(page => `
            <li class="page-item">
              <div class="page-info">
                <div class="page-icon">📘</div>
                <div>
                  <div class="page-name">${page.page_name}</div>
                  <div class="page-id">ID: ${page.page_id}</div>
                </div>
              </div>
              <button class="btn-danger" onclick="disconnectPage('${page.id}')">Disconnect</button>
            </li>
          `).join('')}
        </ul>
      `;
    }
    
    async function connectFacebook() {
      if (!currentWorkspace) {
        document.getElementById('error').innerHTML = '<div class="error">Please select a workspace first</div>';
        return;
      }
      
      const btn = document.getElementById('connectBtn');
      btn.disabled = true;
      btn.textContent = 'Loading...';
      
      try {
        // Get OAuth URL
        const res = await fetch(`${API}/api/facebook/connect?workspace_id=${currentWorkspace}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        
        if (data.auth_url) {
          // Redirect to Facebook OAuth
          window.location.href = data.auth_url;
        } else {
          throw new Error('Failed to get auth URL');
        }
      } catch (err) {
        document.getElementById('error').innerHTML = `<div class="error">${err.message}</div>`;
        btn.disabled = false;
        btn.textContent = 'Connect Facebook Page';
      }
    }
    
    async function disconnectPage(pageId) {
      if (!confirm('Are you sure you want to disconnect this page?')) return;
      
      const res = await fetch(`${API}/api/facebook/pages?workspace_id=${currentWorkspace}&page_id=${pageId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (res.ok) {
        document.getElementById('success').innerHTML = '<div class="success">Page disconnected!</div>';
        loadPages();
      }
    }
    
    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/login';
    }
    
    // Check for OAuth callback
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('code')) {
      // Handle OAuth callback - would need server-side exchange
      document.getElementById('success').innerHTML = '<div class="success">Facebook connected! Select your page.</div>';
    }
    
    loadWorkspaces();
  </script>
</body>
</html>
