<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Management - OmniChat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { color: #1a1a2e; }
    .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h2 { margin-bottom: 20px; color: #333; }
    .workspace-selector { margin-bottom: 24px; }
    .workspace-selector label { margin-bottom: 8px; }
    .workspace-selector select { width: 100%; max-width: 400px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    button { background: #4f46e5; color: white; border: none; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #4338ca; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #6b7280; }
    .btn-secondary:hover { background: #4b5563; }
    .btn-danger { background: #ef4444; }
    .btn-danger:hover { background: #dc2626; }
    .btn-small { padding: 6px 12px; font-size: 12px; }
    .employee-grid { display: grid; gap: 16px; }
    .employee-card { border: 1px solid #eee; border-radius: 8px; padding: 16px; }
    .employee-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .employee-info { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: #e4e6eb; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #555; }
    .employee-name { font-weight: 500; }
    .employee-email { font-size: 13px; color: #666; }
    .access-list { margin-top: 12px; }
    .access-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #f9fafb; border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
    .access-item button { padding: 4px 8px; font-size: 11px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-header h3 { margin: 0; }
    .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #666; }
    .checkbox-list { max-height: 300px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
    .checkbox-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    .checkbox-item:last-child { border-bottom: none; }
    .checkbox-item input { width: auto; margin-right: 10px; }
    .checkbox-item label { flex: 1; margin: 0; cursor: pointer; }
    .empty { text-align: center; color: #999; padding: 40px; }
    .error { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .success { background: #d1fae5; color: #065f46; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>👥 Team & Access</h1>
      <button class="btn-secondary" onclick="logout()">Logout</button>
    </div>
    
    <div class="workspace-selector">
      <label><strong>Workspace:</strong></label>
      <select id="workspace" onchange="loadTeam()">
        <option value="">Select workspace...</option>
      </select>
    </div>
    
    <div id="error"></div>
    <div id="success"></div>
    
    <div class="card">
      <h2>Employees & Chat Access</h2>
      <p style="color:#666;font-size:14px;margin-bottom:16px;">
        Employees (members) can only see conversations they are assigned or explicitly granted access to.
      </p>
      <div id="teamList">
        <div class="empty">Select a workspace to view team members</div>
      </div>
    </div>
  </div>
  
  <!-- Modal for assigning conversations -->
  <div class="modal" id="assignModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Assign Conversations</h3>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <p style="margin-bottom:12px;color:#666;">Select conversations this employee can access:</p>
      <div class="checkbox-list" id="conversationsList"></div>
      <button onclick="saveAccess()" style="margin-top:16px;width:100%;">Save Access</button>
    </div>
  </div>

  <script>
    const API = '/api';
    let token = localStorage.getItem('token');
    let currentWorkspace = '';
    let selectedEmployee = null;
    
    if (!token) {
      window.location.href = '/login';
    }
    
    async function loadWorkspaces() {
      const res = await fetch(`${API}/api/workspaces`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      const select = document.getElementById('workspace');
      data.forEach(ws => {
        const opt = document.createElement('option');
        opt.value = ws.id;
        opt.textContent = ws.name;
        select.appendChild(opt);
      });
    }
    
    async function loadTeam() {
      currentWorkspace = document.getElementById('workspace').value;
      const container = document.getElementById('teamList');
      
      if (!currentWorkspace) {
        container.innerHTML = '<div class="empty">Select a workspace to view team members</div>';
        return;
      }
      
      container.innerHTML = '<div class="empty">Loading...</div>';
      
      const res = await fetch(`${API}/api/employees/access?workspace_id=${currentWorkspace}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (res.status === 403) {
        container.innerHTML = '<div class="empty">Only admins can manage employee access</div>';
        return;
      }
      
      const { employees } = await res.json();
      
      if (!employees?.length) {
        container.innerHTML = '<div class="empty">No employees in this workspace yet.<br>Invite members using the Super Admin panel.</div>';
        return;
      }
      
      container.innerHTML = `
        <div class="employee-grid">
          ${employees.map(emp => `
            <div class="employee-card">
              <div class="employee-header">
                <div class="employee-info">
                  <div class="avatar">${(emp.profiles?.full_name || emp.profiles?.email || 'U')[0].toUpperCase()}</div>
                  <div>
                    <div class="employee-name">${emp.profiles?.full_name || 'Unknown'}</div>
                    <div class="employee-email">${emp.profiles?.email || ''}</div>
                  </div>
                </div>
                <button class="btn-secondary btn-small" onclick="openAssignModal('${emp.user_id}')">
                  Manage Access
                </button>
              </div>
              <div class="access-list">
                <strong>Accessible Conversations:</strong>
                ${emp.access?.length ? emp.access.map(a => `
                  <div class="access-item">
                    <span>${a.conversations?.contacts?.name || 'Conversation ' + a.conversation_id.slice(0,8)}</span>
                    <button class="btn-danger btn-small" onclick="removeAccess('${a.id}')">Remove</button>
                  </div>
                `).join('') : '<div style="color:#999;font-size:13px;margin-top:8px;">No specific access granted</div>'}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }
    
    async function openAssignModal(employeeId) {
      selectedEmployee = employeeId;
      
      // Load available conversations
      const res = await fetch(`${API}/api/conversations`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const conversations = await res.json();
      
      const container = document.getElementById('conversationsList');
      container.innerHTML = conversations.map(c => `
        <div class="checkbox-item">
          <input type="checkbox" id="conv_${c.id}" value="${c.id}">
          <label for="conv_${c.id}">${c.contact?.name || 'Unknown'} - ${c.channel?.type || 'Unknown channel'}</label>
        </div>
      `).join('') || '<div class="empty">No conversations available</div>';
      
      document.getElementById('assignModal').classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('assignModal').classList.remove('active');
      selectedEmployee = null;
    }
    
    async function saveAccess() {
      const checkboxes = document.querySelectorAll('#conversationsList input:checked');
      const conversationIds = Array.from(checkboxes).map(cb => cb.value);
      
      const res = await fetch(`${API}/api/employees/access?workspace_id=${currentWorkspace}`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ employee_id: selectedEmployee, conversation_ids: conversationIds })
      });
      
      if (res.ok) {
        document.getElementById('success').innerHTML = '<div class="success">Access updated!</div>';
        closeModal();
        loadTeam();
      }
    }
    
    async function removeAccess(accessId) {
      if (!confirm('Remove access to this conversation?')) return;
      
      const res = await fetch(`${API}/api/employees/access?workspace_id=${currentWorkspace}&access_id=${accessId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (res.ok) {
        loadTeam();
      }
    }
    
    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/login';
    }
    
    loadWorkspaces();
  </script>
</body>
</html>
